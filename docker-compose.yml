services:
  unit3dup:
    build:
      context: .
    container_name: unit3dup
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      TZ: "${TZ:-Europe/Paris}"
      UNIT3DUP_CONFIG_ROOT: /config
      HOME: /tmp/unit3dup
    volumes:
      - ./docker-data/config:/config
      - ./docker-data/watch:/watch
      - ./docker-data/done:/done
      - ./docker-data/media:/data
    command: ["-watcher"]
  unit3dup-web:
    profiles: ["web"]
    build:
      context: .
    container_name: unit3dup-web
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      TZ: "${TZ:-Europe/Paris}"
      UNIT3DUP_CONFIG_ROOT: /config
      HOME: /tmp/unit3dup
      UNIT3DUP_WEB_HOST: 0.0.0.0
      UNIT3DUP_WEB_PORT: 8787
      UNIT3DUP_LOCAL_CONFIG_PATH: ./docker-data/config
      UNIT3DUP_LOCAL_WATCH_PATH: ./docker-data/watch
      UNIT3DUP_LOCAL_DONE_PATH: ./docker-data/done
      UNIT3DUP_LOCAL_DATA_PATH: ./docker-data/media
    volumes:
      - ./docker-data/config:/config
      - ./docker-data/watch:/watch
      - ./docker-data/done:/done
      - ./docker-data/media:/data
    ports:
      - "${UNIT3DUP_WEB_PORT:-8787}:8787"
    entrypoint: ["unit3dup-web"]
